<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مدونة عبد العزيز</title>
<p>مرحبا بكم في مدونتي</p>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* الفورم */
.container{
  width:90%;
  max-width:900px;
  padding:25px;
  margin-top:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  box-shadow:0 0 40px rgba(0,229,255,0.2);
}

h1{
  color:white;
  text-align:center;
  margin-bottom:15px;
  text-shadow:0 0 15px #00e5ff;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.full{grid-column:span 2;}

input,textarea{
  padding:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  transition:0.3s;
}

input:focus,textarea:focus{
  outline:none;
  box-shadow:0 0 20px #00e5ff;
  transform:scale(1.03);
}

/* زر */
button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00e5ff,#0072ff);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00e5ff;
}

/* صورة */
.profile{
  text-align:center;
  margin-bottom:15px;
}

.profile img{
  width:130px;
  height:130px;
  border-radius:50%;
  display:none;
  border:4px solid #00e5ff;
  box-shadow:0 0 25px #00e5ff;
  margin-top:10px;
}

/* CV */
.cv{
  display:none;
  width:90%;
  max-width:1000px;
  margin:20px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 50px rgba(0,229,255,0.3);
}

/* Header */
.header{
  background:linear-gradient(135deg,#00e5ff,#0072ff);
  padding:40px;
  position:relative;
  text-align:center;
  color:white;
}

.header img{
  position:absolute;
  right:30px;
  top:30px;
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid white;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* Layout */
.main{
  display:grid;
  grid-template-columns:1fr 2fr;
}

/* Sidebar */
.sidebar{
  background:#0f172a;
  padding:20px;
}

.sidebar h3{
  color:#00e5ff;
  margin-bottom:5px;
}

/* Content */
.content{
  background:#1e293b;
  padding:20px;
}

.content h3{
  color:#00e5ff;
  margin-bottom:5px;
}

/* Sections */
.section{
  margin-bottom:15px;
}

/* Footer */
.signature{
  text-align:center;
  padding:15px;
  background:#020617;
  font-size:14px;
}

.signature span{
  color:#00e5ff;
  font-weight:bold;
  text-shadow:0 0 10px #00e5ff;
}
@media print {

  body {
    background: white !important;
  }

  .container {
    display: none !important;
  }

  .cv {
    display: block !important;
    width: 100%;
    margin: 0;
    box-shadow: none;
    font-size: 14px;
  }

  .header {
    background: #1e3a8a !important;
    color: white !important;
    padding: 25px !important;
    text-align: left !important;
  }

  .header h1 {
    font-size: 26px;
  }

  .main {
    display: block !important;
  }

  .sidebar {
    background: white !important;
    color: black !important;
    padding: 10px !important;
  }

  .content {
    background: white !important;
    color: black !important;
    padding: 10px !important;
  }

  .section {
    margin-bottom: 10px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
  }

  h3 {
    color: #1e3a8a !important;
    font-size: 16px;
  }

  p {
    font-size: 13px;
    line-height: 1.6;
  }

  img {
    box-shadow: none !important;
    border: 2px solid #ccc !important;
  }

  button {
    display: none !important;
  }

}
</style>
</head>

<body>

<div class="container">

<h1>🤖 سيرتي الذاتيه </h1>

<div class="profile">
<button onclick="upload.click()">📷 صورتي </button>
<input type="file" id="upload" hidden>
<img id="preview">
</div>

<div class="grid">
<input id="name" placeholder="الاسم الكامل ">
<input id="age" placeholder="العمر">

<input id="phone" placeholder="الهاتف">
<input id="email" placeholder="البريدالالكتروني">

<input class="full" id="skills" placeholder="المهارات">
<input class="full" id="edu" placeholder="التعليم">
<select id="status">
  <option value="">الحالة الاجتماعية</option>
  <option value="أعزب">أعزب</option>
  <option value="متزوج">متزوج</option>
</select>
<input id="exp" placeholder="الخبرة">
<input id="lang" placeholder="اللغات">
<textarea class="full" id="goal" placeholder="هدفك"></textarea>
<textarea class="full" id="bio" placeholder="نبذة عنك"></textarea>

<div class="full">
<button onclick="generate()">🚀 إنشاء CV</button>
</div>
</div>

</div>

<!-- CV -->
<div class="cv" id="cv">

<div class="header">
<img id="cvImg">
<h1 id="cvName"></h1>
<p id="cvAge"></p>
<p id="cvGoal"></p>
</div>

<div class="main">

<div class="sidebar">
<div class="section">
<h3>📞 تواصل</h3>
<p id="cvPhone"></p>
<p id="cvEmail"></p>
</div>

<div class="section">
<h3>🌍 لغات</h3>
<p id="cvLang"></p>
</div>
<div class="section">
<h3>💍 الحالة الاجتماعية</h3>
<p id="cvStatus"></p>

</div>
<div class="section">
<h3>🎓 تعليم</h3>
<p id="cvEdu"></p>
</div>
</div>

<div class="content">
<div class="section">
<h3>👤 نبذة</h3>
<p id="cvBio"></p>
</div>

<div class="section">
<h3>💻 مهارات</h3>
<p id="cvSkills"></p>
</div>

<div class="section">
<h3>📊 خبرة</h3>
<p id="cvExp"></p>
</div>
</div>

</div>

<div class="signature">
✨  <span id="cvFooter"></span>
<p style="font-size:12px;opacity:0.6;">.</p>
</div>

<button onclick="window.print()">📄 تحميل PDF</button>

</div>

<script>

/* صورة */
upload.onchange = e=>{
  const file = e.target.files[0];
  if(file){
    const r = new FileReader();
    r.onload = ev=>{
      preview.src = ev.target.result;
      preview.style.display="block";
    }
    r.readAsDataURL(file);
  }
}

/* إنشاء */
function generate(){

cv.style.display="block";

cvName.innerText = document.getElementById("name").value;
cvGoal.innerText = goal.value;
cvAge.innerText = "العمر: " + age.value;

cvPhone.innerText = phone.value;
cvEmail.innerText = email.value;

cvSkills.innerText = skills.value;
cvExp.innerText = exp.value;

cvLang.innerText = lang.value;
cvEdu.innerText = edu.value;
let s = document.getElementById("status").value;
cvStatus.innerText = s ? s : "غير محدد";
cvBio.innerText = bio.value;

/* صورة */
if(preview.src){
  cvImg.src = preview.src;
}

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
